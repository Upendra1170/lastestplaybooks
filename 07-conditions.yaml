- name: condition
  hosts: localhost
  tasks:
    - name: check the condition
      ansible.builtin.command:
        cmd: whoami
      register: output

    - name: print value
      ansible.builtin.debug:
        msg: "user is: {{ output.stdout }}"

    - name: create user
      ansible.builtin.user:
        name: roboshop
      when: output.stdout != 0    